<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./assets/img/base/favicon.ico.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обучение йони-массажу в Казани</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/experience.css">
</head>
<body>
    <main>
        <section class="intro">
            <div class="container">
                <div class="intro__content">
                    <div class="card__experience">
                        <div class="card__experience__text">
                            <h2 class="experience__tittle">Какой у вас опыт в телесных и массажных практиках?</h2>
                        </div>
                        <div class="card__experience__link">
                          <label class="experience__checkbox">
                             <input type="checkbox">
                             <span class="box"></span>
                             <span class="text">Начинающий — совсем нет опыта</span>
                          </label>

                          <label class="experience__checkbox">
                             <input type="checkbox">
                             <span class="box"></span>
                             <span class="text">Начальный уровень — есть небольшие знания и первый опыт</span>
                          </label>

                          <label class="experience__checkbox">
                             <input type="checkbox">
                             <span class="box"></span>
                             <span class="text">Средний уровень — уже проходил(а) курсы или регулярно практикует</span>
                          </label>

                          <label class="experience__checkbox">
                             <input type="checkbox">
                             <span class="box"></span>
                             <span class="text">Продвинутый уровень — имею серьёзный опыт в данной сфере</span>
                          </label>
                        </div>
                        <div class="card__experience__button">
                             <a href="./learning.html" class="experience__button"><i class="fa-solid fa-arrow-left"></i></a>
                             <a href="./vkontakte.html" class="experience__button">ОТПРАВИТЬ</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
