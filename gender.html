<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="./assets/img/base/favicon.ico.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Обучение йони-массажу в Казани</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
        <link rel="stylesheet" href="./assets/css/base.css" />
        <link rel="stylesheet" href="./assets/css/gender.css" />
    </head>
    <body>
        <main>
            <section class="gender">
                <div class="line"></div>
                <div class="container">
                    <div class="gender__content">
                        <div class="gender__content__text">
                            <h2 class="title">Ваш пол?</h2>
                            <p class="text">
                                Йони-массаж чаще всего выполняют мужчины-мастера, но также ему обучаются и женщины, для саморазвития, работы
                                с клиентками или с партнёром.
                            </p>
                        </div>
                        <div class="gender__content__wrapper">
                            <a href="./age.html" class="el" data-value="female">
                                <img src="./assets/img/home/gender__img.jpg" alt="Женщина" class="el__img" />
                                <p class="el__text">Женщина</p>
                            </a>
                            <a href="./age.html" class="el" data-value="male">
                                <img src="./assets/img/home/gender__img__two.jpg" alt="Мужчина" class="el__img" />
                                <p class="el__text">Мужчина</p>
                            </a>
                        </div>
                        <div class="gender__content__links">
                            <a href="./index.html" class="gender__link"><i class="fa-solid fa-arrow-left"></i></a>
                            <a href="./age.html" class="gender__link"><i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
        <script src="./assets/js/gender.js"></script>
    </body>
</html>
