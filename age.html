<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="./assets/img/base/favicon.ico.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Обучение йони-массажу в Казани</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="./assets/css/base.css" />
        <link rel="stylesheet" href="./assets/css/age.css" />
    </head>
    <body>
        <main>
            <section class="age">
                <div class="container">
                    <div class="content">
                        <div class="card__age">
                            <div class="card__age__text">
                                <h2 class="age__title">Ваш возраст?</h2>
                                <p class="age__text">
                                    Это позволит мне лучше понять ваш жизненный этап и подобрать программу обучения йони-массажу, которая
                                    будет соответствовать вашим текущим потребностям и возможностям.
                                </p>
                            </div>
                            <div class="card__age__row">
                                <div class="card__age__link">
                                    <a href="#" data-value="18-25" class="age__link">
                                        <input type="radio" name="age" value="18-25" class="age__input" />
                                        <span>18–29 лет</span>
                                    </a>

                                    <a href="#" data-value="30-44" class="age__link">
                                        <input type="radio" name="age" value="30-44" class="age__input" />
                                        <span>30–44 года</span>
                                    </a>

                                    <a href="#" data-value="45+" class="age__link">
                                        <input type="radio" name="age" value="45+" class="age__input" />
                                        <span>45 лет и старше</span>
                                    </a>
                                </div>
                                <div class="card__age__button">
                                    <a href="./gender.html" class="age__button prev"><i class="fa-solid fa-arrow-left"></i></a>
                                    <a href="./learning.html" class="age__button next"><i class="fa-solid fa-arrow-right"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <script src="./assets/js/age.js"></script>
    </body>
</html>
